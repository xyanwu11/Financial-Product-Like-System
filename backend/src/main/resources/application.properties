# =============================================
# Financial Product Like System - 應用程式設定
# =============================================

# Application
spring.application.name=product-like-system

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/product_like_db?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Taipei
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# UTF-8 編碼
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-response=true

# CORS
app.cors.allowed-origins=http://localhost:5173
